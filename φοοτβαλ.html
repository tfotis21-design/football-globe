<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Globe - Live Data</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; color: #fff; }
        #globeViz { width: 100vw; height: 100vh; }
        /* (Βάλε εδώ ακριβώς το ίδιο CSS που είχαμε στο προηγούμενο βήμα για το Sidebar κλπ) */

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            z-index: 100;
        }
    </style>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="loading">Φόρτωση δεδομένων από το Web...</div>
    <div id="globeViz"></div>

    <!-- (Βάλε εδώ ακριβώς το ίδιο HTML για το <div id="teamSidebar">...</div>) -->

    <script>
        // Το URL από όπου θα διαβάζει τα δεδομένα.
        // Όταν το ανεβάσεις, αυτό θα τραβάει το JSON αρχείο σου από τον server του GitHub!
        const DATA_URL = 'teams.json';

        // Χρησιμοποιούμε το Fetch API της Javascript για να πάρουμε τα δεδομένα οπίσθια
        fetch(DATA_URL)
            .then(response => response.json())
            .then(teamData => {

                // Κρύβουμε το μήνυμα φόρτωσης
                document.getElementById('loading').style.display = 'none';

                // Δημιουργούμε την υδρόγειο ΤΩΡΑ, αφού ήρθαν τα δεδομένα
                const world = Globe()
                    (document.getElementById('globeViz'))
                    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
                    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                    .pointOfView({ lat: 20, lng: -20, altitude: 2 })
                    .labelsData(teamData) // Περνάμε τα live δεδομένα!
                    .labelLat(d => d.lat)
                    .labelLng(d => d.lng)
                    .labelText(d => d.team_name)
                    .labelSize(d => 1.5)
                    .labelDotRadius(d => 0.6)
                    .labelColor(() => 'rgba(255, 255, 255, 0.8)')
                    .labelResolution(2)
                    .onLabelClick(team => {
                        world.pointOfView({ lat: team.lat, lng: team.lng, altitude: 0.8 }, 1000);
                        // showSidebar(team); // Εδώ καλείς τη συνάρτηση για το μενού
                    })
                    .labelLabel(d => `
                        <div style="background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; border: 1px solid #444;">
                            <b>${d.team_name}</b><br/>
                            <span style="font-size: 12px; color: #aaa;">${d.city}, ${d.country}</span>
                        </div>
                    `);

                world.controls().autoRotate = true;
                world.controls().autoRotateSpeed = 0.5;
            })
            .catch(error => {
                console.error("Σφάλμα κατά τη φόρτωση των δεδομένων:", error);
                document.getElementById('loading').innerText = "Αποτυχία φόρτωσης δεδομένων.";
            });
    </script>
</body>
</html>
