<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Globe - Flat & Fast</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset & Base */
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #0f172a; /* dark flat bg */
            font-family: 'Montserrat', sans-serif; 
            color: #f8fafc; 
        }
        
        #globeViz { width: 100vw; height: 100vh; cursor: crosshair; }
        
        /* Sidebar - No glassmorphism, no bullshit */
        #teamSidebar {
            position: absolute; top: 0; right: -420px; width: 380px; height: 100vh;
            background: #1e293b; 
            border-left: 1px solid #334155;
            transition: right 0.3s ease-in-out;
            padding: 30px 25px; box-sizing: border-box; z-index: 10; overflow-y: auto;
        }
        #teamSidebar.active { right: 0; }
        
        .close-btn { 
            position: absolute; top: 15px; right: 20px; cursor: pointer; 
            font-size: 28px; color: #94a3b8; transition: color 0.2s; 
        }
        .close-btn:hover { color: #f8fafc; }
        
        .team-header { text-align: left; margin-bottom: 24px; border-bottom: 1px solid #334155; padding-bottom: 15px;}
        .team-name { 
            font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700; 
            margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; 
        }
        .team-league { font-size: 13px; color: #cbd5e1; text-transform: uppercase; font-weight: 600; }
        .team-country { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        .team-trophies { 
            font-size: 12px; color: #fbbf24; font-weight: bold; margin-top: 10px; 
            display: none; 
        }
        
        .jersey-container { 
            width: 100%; height: 220px; background: #0f172a; 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 24px; border: 1px solid #334155;
        }
        .jersey-container img { max-width: 80%; max-height: 80%; object-fit: contain; }
        
        .info-box { 
            background: #0f172a; padding: 12px 15px; 
            border-radius: 6px; margin-bottom: 10px; border: 1px solid #334155; 
        }
        .info-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .info-value { font-size: 14px; font-weight: 600; color: #e2e8f0; }
        
        /* Utils */
        #loading { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 14px; z-index: 100; color: #f8fafc; background: #1e293b; 
            padding: 12px 24px; border-radius: 4px; border: 1px solid #334155;
        }
        #instructions { 
            position: absolute; bottom: 20px; left: 20px; font-size: 12px; 
            color: #94a3b8; pointer-events: none; background: #1e293b; 
            padding: 8px 16px; border-radius: 4px; border: 1px solid #334155;
        }

        /* WebGL Tooltip */
        .custom-tooltip {
            background: #1e293b;
            color: #f8fafc;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #334155;
            font-size: 12px;
            font-family: 'Montserrat', sans-serif;
            pointer-events: none;
        }
    </style>
    <!-- globe.gl apo CDN -->
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="loading">Loading stadiums...</div>
    <div id="globeViz"></div>
    <div id="instructions">Click on a country to load teams.</div>

    <div id="teamSidebar">
        <div class="close-btn" id="closeSidebar">&times;</div>
        <div class="team-header">
            <h2 class="team-name" id="sidebarTeamName">ΟΜΑΔΑ</h2>
            <div class="team-league" id="sidebarLeague">ΠΡΩΤΑΘΛΗΜΑ</div>
            <p class="team-country" id="sidebarCountry">ΧΩΡΑ</p>
            <div class="team-trophies" id="sidebarTrophies">🏆</div>
        </div>

        <div class="jersey-container">
            <img id="jerseyImage" src="" alt="Φανέλα" style="display: none;">
        </div>

        <div class="info-box">
            <div class="info-label">Γήπεδο</div>
            <div class="info-value" id="sidebarStadium">Στάδιο</div>
        </div>
        <div class="info-box">
            <div class="info-label">Πόλη</div>
            <div class="info-value" id="sidebarCity">Πόλη</div>
        </div>
    </div>

    <script>
        let allTeams = [];
        let world;
        let selectedCountry = null; // gia na kseroume pou exoume kanei click

        // Fortwnoume map & json
        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(res => res.json()),
            fetch('teams.json').then(res => res.json())
        ]).then(([countriesData, teamsData]) => {
            
            document.getElementById('loading').style.display = 'none';
            allTeams = teamsData;

            world = Globe()
                (document.getElementById('globeViz'))
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg') 
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .showAtmosphere(true)
                .atmosphereColor('#42b6f5')
                .atmosphereAltitude(0.15)
                .pointOfView({ lat: 38.0361, lng: 23.7431, altitude: 2 }) // default view panw apo agia sofia
                
                // Polygons (Xwres)
                .polygonsData(countriesData.features)
                .polygonAltitude(0.005)
                .polygonCapColor(() => 'rgba(0, 0, 0, 0.5)') // skouro default
                .polygonSideColor(() => 'rgba(0, 0, 0, 0.5)')
                .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.05)')
                .onPolygonHover(hoverD => {
                    if (hoverD !== selectedCountry) {
                        world.polygonCapColor(d => d === hoverD ? 'rgba(59, 130, 246, 0.2)' : (d === selectedCountry ? 'rgba(76, 175, 80, 0.3)' : 'rgba(0, 0, 0, 0.5)'));
                    }
                })
                .onPolygonClick(polygon => {
                    const countryName = polygon.properties.ADMIN;
                    selectedCountry = polygon;
                    
                    // Kanoume to selected polygon ligo pio fwteino, ta alla pio skoura
                    world.polygonCapColor(d => d === selectedCountry ? 'rgba(76, 175, 80, 0.3)' : 'rgba(0, 0, 0, 0.8)');
                    world.polygonSideColor(d => d === selectedCountry ? 'rgba(76, 175, 80, 0.3)' : 'rgba(0, 0, 0, 0.8)');
                    
                    // Zoom sto kentro ths xwras based on GeoJSON properties
                    const lat = polygon.properties.LABEL_LAT || polygon.properties.CENTROID_LAT || 0;
                    const lng = polygon.properties.LABEL_LNG || polygon.properties.CENTROID_LNG || 0;
                    if (lat && lng) {
                        world.pointOfView({ lat: lat, lng: lng, altitude: 0.8 }, 1200);
                    }

                    // Fortwnoume mono tis omades autis ths xwras
                    const teamsInCountry = allTeams.filter(team => team.country === countryName);
                    if(teamsInCountry.length > 0) {
                        renderMarkers(groupTeamsByCity(teamsInCountry));
                    } else {
                        // an den exei omades ketharizoume ta points
                        world.pointsData([]);
                    }
                });

            world.controls().autoRotate = false;

            // Omadopoihsh se clusters per city
            function groupTeamsByCity(teams) {
                const groups = {};
                teams.forEach(t => {
                    if (!groups[t.city]) groups[t.city] = { lat: t.lat, lng: t.lng, city: t.city, teams: [] };
                    groups[t.city].teams.push(t);
                });
                
                const elementsData = [];
                Object.values(groups).forEach(group => {
                    if (group.teams.length === 1) {
                        elementsData.push({ type: 'team', ...group.teams[0], displayLat: group.lat, displayLng: group.lng });
                    } else {
                        elementsData.push({ type: 'cluster', lat: group.lat, lng: group.lng, city: group.city, teams: group.teams });
                    }
                });
                return elementsData;
            }

            // Spaei to cluster se ksekxwrista points (kyklika)
            function expandCluster(cluster) {
                // dynamic radius gia na min peftoun panw h mia sthn allh se megales poleis px london
                let r = 0.08 + (cluster.teams.length * 0.02); 
                
                const expanded = cluster.teams.map((t, i) => {
                    const angle = (Math.PI * 2 / cluster.teams.length) * i;
                    return {
                        type: 'team',
                        ...t,
                        displayLat: cluster.lat + r * Math.cos(angle),
                        displayLng: cluster.lng + r * Math.sin(angle)
                    };
                });

                // kratame ta ypoloipa kai kanoume inject ta expanded
                const current = world.pointsData().filter(d => d.city !== cluster.city);
                world.pointsData([...current, ...expanded]);
                
                // zoom in sthn polh
                world.pointOfView({ lat: cluster.lat, lng: cluster.lng, altitude: 0.1 }, 1000);
            }

            // Render metavash apo HTML se WebGL gia perrformance
            function renderMarkers(data) {
                world
                    .htmlElementsData([]) // ka8arisma ta palia html divs
                    .pointsData(data)
                    .pointLat(d => d.type === 'cluster' ? d.lat : d.displayLat)
                    .pointLng(d => d.type === 'cluster' ? d.lng : d.displayLng)
                    .pointColor(d => {
                        if (d.type === 'cluster') return '#3b82f6';
                        if (d.id === 'aek_athens') return '#fbbf24'; // exception gia aek :p
                        return '#ef4444';
                    })
                    .pointAltitude(0.01)
                    .pointRadius(d => d.type === 'cluster' ? 0.3 : 0.12)
                    .pointResolution(32)
                    .onPointClick(d => {
                        if (d.type === 'cluster') {
                            expandCluster(d);
                        } else {
                            world.pointOfView({ lat: d.displayLat, lng: d.displayLng, altitude: 0.15 }, 1000);
                            showSidebar(d);
                        }
                    })
                    .pointLabel(d => {
                        // tooltips otan kaneis hover
                        if (d.type === 'cluster') {
                            return `<div class="custom-tooltip"><b>${d.city}</b><br>${d.teams.length} Ομάδες</div>`;
                        }
                        const c = d.id === 'aek_athens' ? '#fbbf24' : '#fff';
                        return `<div class="custom-tooltip"><b style="color:${c};">${d.team_name}</b><br><span style="color:#94a3b8;">${d.stadium}</span></div>`;
                    });
            }

            // UI Logic
            const sidebar = document.getElementById('teamSidebar');
            
            function showSidebar(team) {
                document.getElementById('sidebarTeamName').innerText = team.team_name;
                document.getElementById('sidebarLeague').innerText = team.league || "Unknown";
                document.getElementById('sidebarCountry').innerText = team.country;
                document.getElementById('sidebarStadium').innerText = team.stadium;
                document.getElementById('sidebarCity').innerText = team.city;
                
                const trophiesDiv = document.getElementById('sidebarTrophies');
                if (team.trophies && team.trophies !== "") {
                    trophiesDiv.innerText = team.trophies;
                    trophiesDiv.style.display = "inline-block";
                } else {
                    trophiesDiv.style.display = "none";
                }

                const jerseyImg = document.getElementById('jerseyImage');
                if (team.jersey_url && team.jersey_url !== "") {
                    jerseyImg.src = team.jersey_url;
                    jerseyImg.style.display = "block";
                } else {
                    jerseyImg.style.display = "none";
                }

                if (team.id === 'aek_athens') {
                   document.getElementById('sidebarTeamName').style.color = '#fbbf24';
                   document.getElementById('sidebarLeague').style.color = '#fbbf24';
                   sidebar.style.borderLeftColor = '#fbbf24';
                } else {
                   document.getElementById('sidebarTeamName').style.color = '#f8fafc';
                   document.getElementById('sidebarLeague').style.color = '#cbd5e1';
                   sidebar.style.borderLeftColor = '#334155';
                }

                sidebar.classList.add('active');
            }

            document.getElementById('closeSidebar').addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
            
        }).catch(err => {
            console.error("error fetching data:", err);
            document.getElementById('loading').innerText = "Data load error. Check console.";
        });
    </script>
</body>
</html>
