<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Globe</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Arial', sans-serif; color: #fff; }
        #globeViz { width: 100vw; height: 100vh; }
        
        #teamSidebar {
            position: absolute; top: 0; right: -400px; width: 350px; height: 100vh;
            background: rgba(15, 15, 15, 0.95); border-left: 2px solid #333;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 25px; box-sizing: border-box; z-index: 10; overflow-y: auto;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #teamSidebar.active { right: 0; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 28px; color: #888; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }
        
        .team-header { text-align: center; margin-bottom: 20px; }
        .team-name { font-size: 26px; font-weight: 900; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1.5px; }
        .team-country { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Νέο στυλ για τα τρόπαια */
        .team-trophies {
            font-size: 15px; color: #FFD700; font-weight: bold; margin-top: 10px;
            background: rgba(255, 215, 0, 0.1); padding: 8px; border-radius: 5px;
            display: none; /* Κρυφό από προεπιλογή */
        }

        .jersey-container {
            width: 100%; height: 280px; background: #222; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; border: 1px solid #444; position: relative;
        }
        
        .info-box { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .info-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info-value { font-size: 16px; font-weight: bold; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 100; color: #fff; }
    </style>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="loading">Φόρτωση δεδομένων...</div>
    <div id="globeViz"></div>

    <div id="teamSidebar">
        <div class="close-btn" id="closeSidebar">&times;</div>
        <div class="team-header">
            <h2 class="team-name" id="sidebarTeamName">Ομάδα</h2>
            <p class="team-country" id="sidebarCountry">Χώρα</p>
            <div class="team-trophies" id="sidebarTrophies">🏆</div>
        </div>

        <div class="jersey-container">
            <div style="color: #666; text-align: center;">
                <span style="font-size: 40px; display: block; margin-bottom: 10px;">👕</span>
                Εδώ θα μπει η φανέλα
            </div>
        </div>

        <div class="info-box">
            <div class="info-label">Γήπεδο</div>
            <div class="info-value" id="sidebarStadium">Στάδιο</div>
        </div>
        <div class="info-box">
            <div class="info-label">Πόλη</div>
            <div class="info-value" id="sidebarCity">Πόλη</div>
        </div>
    </div>

    <script>
        fetch('teams.json')
            .then(res => res.json())
            .then(teamData => {
                document.getElementById('loading').style.display = 'none';

                const world = Globe()
                    (document.getElementById('globeViz'))
                    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
                    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                    .pointOfView({ lat: 38, lng: 23, altitude: 1.5 }) // Αρχική οπτική κοντά στην Ελλάδα
                    .labelsData(teamData)
                    .labelLat(d => d.lat)
                    .labelLng(d => d.lng)
                    .labelText(d => d.team_name)
                    .labelSize(1.2)
                    .labelDotRadius(0.3) // Πιο λεπτή κουκκίδα για μέγιστη ακρίβεια
                    .labelColor(() => '#ffffff')
                    .labelResolution(2)
                    .onLabelClick(team => {
                        world.pointOfView({ lat: team.lat, lng: team.lng, altitude: 0.5 }, 1200);
                        showSidebar(team);
                    })
                    .labelLabel(d => `
                        <div style="background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 6px; border: 1px solid #555;">
                            <b style="font-size: 14px;">${d.team_name}</b><br/>
                            <span style="font-size: 11px; color: #bbb;">${d.stadium}</span>
                            ${d.trophies ? `<br/><span style="color: #FFD700; font-size: 11px;">${d.trophies}</span>` : ''}
                        </div>
                    `);

                world.controls().autoRotate = true;
                world.controls().autoRotateSpeed = 0.3;

                const sidebar = document.getElementById('teamSidebar');
                
                function showSidebar(team) {
                    document.getElementById('sidebarTeamName').innerText = team.team_name;
                    document.getElementById('sidebarCountry').innerText = team.country;
                    document.getElementById('sidebarStadium').innerText = team.stadium;
                    document.getElementById('sidebarCity').innerText = team.city;
                    
                    const trophiesDiv = document.getElementById('sidebarTrophies');
                    if (team.trophies && team.trophies !== "") {
                        trophiesDiv.innerText = team.trophies;
                        trophiesDiv.style.display = "block";
                    } else {
                        trophiesDiv.style.display = "none";
                    }

                    // Ειδικός χρωματισμός (π.χ. ΑΕΚ)
                    if (team.id === 'aek_athens') {
                       document.getElementById('sidebarTeamName').style.color = '#F3D11A';
                       sidebar.style.borderLeftColor = '#F3D11A';
                    } else {
                       document.getElementById('sidebarTeamName').style.color = '#fff';
                       sidebar.style.borderLeftColor = '#333';
                    }

                    sidebar.classList.add('active');
                }

                document.getElementById('closeSidebar').addEventListener('click', () => {
                    sidebar.classList.remove('active');
                    const pov = world.pointOfView();
                    world.pointOfView({ lat: pov.lat, lng: pov.lng, altitude: 1.5 }, 1000);
                });
            })
            .catch(err => {
                console.error("Σφάλμα:", err);
                document.getElementById('loading').innerText = "Αποτυχία φόρτωσης. Έλεγξε αν υπάρχει το teams.json";
            });
    </script>
</body>
</html>
