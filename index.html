<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Globe - Night Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #020202; font-family: 'Arial', sans-serif; color: #fff; }
        #globeViz { width: 100vw; height: 100vh; }
        
        #teamSidebar {
            position: absolute; top: 0; right: -400px; width: 350px; height: 100vh;
            background: rgba(10, 10, 10, 0.95); border-left: 2px solid #333;
            transition: right 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            padding: 25px; box-sizing: border-box; z-index: 10; overflow-y: auto;
            backdrop-filter: blur(5px);
        }
        #teamSidebar.active { right: 0; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 28px; color: #888; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }
        
        .team-header { text-align: center; margin-bottom: 20px; }
        .team-name { font-size: 26px; font-weight: 900; margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .team-country { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .team-trophies {
            font-size: 14px; color: #FFD700; font-weight: bold; margin-top: 10px;
            background: rgba(255, 215, 0, 0.05); padding: 8px; border-radius: 5px;
            display: none; border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .jersey-container {
            width: 100%; height: 280px; background: transparent; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; position: relative;
        }
        .jersey-container img {
            max-width: 90%; max-height: 90%; object-fit: contain;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }
        
        .info-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #222; }
        .info-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info-value { font-size: 16px; font-weight: bold; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; z-index: 100; color: #fff; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 30px; }
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #aaa; pointer-events: none; }
    </style>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="loading">Φόρτωση χάρτη...</div>
    <div id="globeViz"></div>
    <div id="instructions">Κάνε κλικ σε μια χώρα για να δεις τις ομάδες της.</div>

    <div id="teamSidebar">
        <div class="close-btn" id="closeSidebar">&times;</div>
        <div class="team-header">
            <h2 class="team-name" id="sidebarTeamName">Ομάδα</h2>
            <p class="team-country" id="sidebarCountry">Χώρα</p>
            <div class="team-trophies" id="sidebarTrophies">🏆</div>
        </div>

        <div class="jersey-container">
            <img id="jerseyImage" src="" alt="Φανέλα" style="display: none;">
        </div>

        <div class="info-box">
            <div class="info-label">Γήπεδο</div>
            <div class="info-value" id="sidebarStadium">Στάδιο</div>
        </div>
        <div class="info-box">
            <div class="info-label">Πόλη</div>
            <div class="info-value" id="sidebarCity">Πόλη</div>
        </div>
    </div>

    <script>
        let allTeams = [];
        let world;

        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(res => res.json()),
            fetch('teams.json').then(res => res.json())
        ]).then(([countriesData, teamsData]) => {
            
            document.getElementById('loading').style.display = 'none';
            allTeams = teamsData;

            world = Globe()
                (document.getElementById('globeViz'))
                // ΝΕΟΣ ΧΑΡΤΗΣ ΜΕ ΦΩΤΑ ΠΟΛΕΩΝ
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                
                // ΕΝΕΡΓΟΠΟΙΗΣΗ ΑΤΜΟΣΦΑΙΡΑΣ (Μπλε λάμψη)
                .showAtmosphere(true)
                .atmosphereColor('#3a86ff')
                .atmosphereAltitude(0.15)
                .pointOfView({ lat: 38, lng: 23, altitude: 2.5 })
                
                // ΣΥΝΟΡΑ ΧΩΡΩΝ (Διάφανα πλέον, φωτίζουν μόνο στο hover)
                .polygonsData(countriesData.features)
                .polygonAltitude(0.005)
                .polygonCapColor(() => 'rgba(0, 0, 0, 0)') // Εντελώς διάφανο για να φαίνονται τα φώτα
                .polygonSideColor(() => 'rgba(0, 0, 0, 0)')
                .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.1)') // Αχνά σύνορα
                .onPolygonHover(hoverD => {
                    world.polygonCapColor(d => d === hoverD ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0)');
                })
                .onPolygonClick(polygon => {
                    const countryName = polygon.properties.ADMIN;
                    const teamsInCountry = allTeams.filter(team => team.country === countryName);
                    world.labelsData(teamsInCountry);
                    const [lat, lng] = [polygon.properties.LABEL_Y, polygon.properties.LABEL_X];
                    if(lat && lng) {
                        world.pointOfView({ lat: lat, lng: lng, altitude: 0.8 }, 1000);
                    }
                })

                // ΠΙΝΕΖΕΣ (Έντονο χρώμα όπως το BattleBots)
                .labelsData([])
                .labelLat(d => d.lat)
                .labelLng(d => d.lng)
                .labelText(() => '') 
                .labelSize(0)
                .labelDotRadius(0.8)
                .labelColor(() => '#ff0055') // Έντονο νέον ροζ/κόκκινο
                .labelResolution(2)
                .onLabelClick(team => {
                    world.pointOfView({ lat: team.lat, lng: team.lng, altitude: 0.4 }, 1000);
                    showSidebar(team);
                })
                .labelLabel(d => `
                    <div style="background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 6px; border: 1px solid #ff0055; text-align: center;">
                        <b style="font-size: 15px; color: #fff;">${d.team_name}</b><br/>
                        <span style="font-size: 12px; color: #bbb;">${d.stadium}</span>
                    </div>
                `);

            world.controls().autoRotate = true;
            world.controls().autoRotateSpeed = 0.3;

            const sidebar = document.getElementById('teamSidebar');
            
            function showSidebar(team) {
                document.getElementById('sidebarTeamName').innerText = team.team_name;
                document.getElementById('sidebarCountry').innerText = team.country;
                document.getElementById('sidebarStadium').innerText = team.stadium;
                document.getElementById('sidebarCity').innerText = team.city;
                
                const trophiesDiv = document.getElementById('sidebarTrophies');
                if (team.trophies && team.trophies !== "") {
                    trophiesDiv.innerText = team.trophies;
                    trophiesDiv.style.display = "block";
                } else {
                    trophiesDiv.style.display = "none";
                }

                // Εικόνα Φανέλας
                const jerseyImg = document.getElementById('jerseyImage');
                if (team.jersey_url && team.jersey_url !== "") {
                    jerseyImg.src = team.jersey_url;
                    jerseyImg.style.display = "block";
                } else {
                    jerseyImg.style.display = "none";
                }

                if (team.id === 'aek_athens') {
                   document.getElementById('sidebarTeamName').style.color = '#F3D11A';
                   sidebar.style.borderLeftColor = '#F3D11A';
                } else {
                   document.getElementById('sidebarTeamName').style.color = '#fff';
                   sidebar.style.borderLeftColor = '#ff0055'; // Ταιριάζει με τις κόκκινες πινέζες
                }

                sidebar.classList.add('active');
            }

            document.getElementById('closeSidebar').addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        }).catch(err => {
            console.error("Σφάλμα:", err);
            document.getElementById('loading').innerText = "Σφάλμα! Διόρθωσε το όνομα του αρχείου σε teams.json";
        });
    </script>
</body>
</html>
