<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Globe - Realistic Day Edition & Clustering</title>
    
    <!-- Εισαγωγή αθλητικών γραμματοσειρών από Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #000000 100%); /* Πιο φωτεινό/αθλητικό background */
            font-family: 'Montserrat', sans-serif; 
            color: #fff; 
        }
        
        #globeViz { width: 100vw; height: 100vh; cursor: grab; }
        #globeViz:active { cursor: grabbing; }
        
        /* Βελτιωμένο Glassmorphism Sidebar */
        #teamSidebar {
            position: absolute; top: 0; right: -420px; width: 380px; height: 100vh;
            background: rgba(15, 20, 25, 0.7); 
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* Πιο smooth transition */
            padding: 30px 25px; box-sizing: border-box; z-index: 10; overflow-y: auto;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        #teamSidebar.active { right: 0; }
        
        .close-btn { 
            position: absolute; top: 15px; right: 20px; cursor: pointer; 
            font-size: 32px; color: #aaa; transition: color 0.3s, transform 0.3s; 
            font-family: Arial, sans-serif;
        }
        .close-btn:hover { color: #fff; transform: scale(1.1); }
        
        .team-header { text-align: center; margin-bottom: 20px; }
        .team-name { 
            font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 700; 
            margin: 10px 0 5px 0; text-transform: uppercase; letter-spacing: 1.5px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .team-league { font-size: 14px; color: #00e676; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .team-country { font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 2px; }
        
        .team-trophies { 
            font-size: 13px; color: #FFD700; font-weight: bold; margin-top: 15px; 
            background: rgba(255, 215, 0, 0.1); padding: 10px; border-radius: 8px; 
            display: none; border: 1px solid rgba(255, 215, 0, 0.3); 
        }
        
        .jersey-container { 
            width: 100%; height: 260px; background: rgba(0,0,0,0.2); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 25px; position: relative; border: 1px solid rgba(255,255,255,0.05);
        }
        .jersey-container img { max-width: 85%; max-height: 85%; object-fit: contain; filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.6)); }
        
        .info-box { 
            background: rgba(255,255,255,0.05); padding: 15px; 
            border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); 
            transition: background 0.3s;
        }
        .info-box:hover { background: rgba(255,255,255,0.08); }
        .info-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1.5px; font-weight: 600;}
        .info-value { font-size: 16px; font-weight: 600; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; z-index: 100; color: #fff; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 30px; font-family: 'Oswald', sans-serif; letter-spacing: 1px;}
        #instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 14px; color: #ddd; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(5px);}

        /* CSS για τα Markers (Κουκκίδες) πάνω στην υδρόγειο */
        .marker-cluster {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: 2px solid #fff; color: white; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            font-size: 13px; font-family: 'Oswald', sans-serif;
            box-shadow: 0 0 15px rgba(0, 114, 255, 0.8);
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .marker-cluster:hover { transform: scale(1.3); box-shadow: 0 0 20px rgba(0, 114, 255, 1); }

        .marker-team {
            width: 18px; height: 18px; border-radius: 50%;
            background: radial-gradient(circle, #ff3366 30%, #990033 100%);
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.6);
            cursor: pointer; transition: transform 0.2s;
        }
        .marker-team.aek {
            background: radial-gradient(circle, #F3D11A 30%, #9c8404 100%);
            border-color: #000; box-shadow: 0 0 15px rgba(243, 209, 26, 0.8);
        }
        .marker-team:hover { transform: scale(1.5); }
        
        .marker-tooltip {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 6px;
            font-size: 12px; white-space: nowrap; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; color: #fff;
            border: 1px solid #444; text-align: center;
        }
        .marker-team:hover .marker-tooltip, .marker-cluster:hover .marker-tooltip { opacity: 1; }

    </style>
    <script src="https://unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="loading">ΦΟΡΤΩΣΗ ΓΗΠΕΔΩΝ...</div>
    <div id="globeViz"></div>
    <div id="instructions">Κάνε κλικ σε μια χώρα για να δεις τις ομάδες.</div>

    <div id="teamSidebar">
        <div class="close-btn" id="closeSidebar">&times;</div>
        <div class="team-header">
            <h2 class="team-name" id="sidebarTeamName">ΟΜΑΔΑ</h2>
            <div class="team-league" id="sidebarLeague">ΠΡΩΤΑΘΛΗΜΑ</div>
            <p class="team-country" id="sidebarCountry">ΧΩΡΑ</p>
            <div class="team-trophies" id="sidebarTrophies">🏆</div>
        </div>

        <div class="jersey-container">
            <img id="jerseyImage" src="" alt="Φανέλα" style="display: none;">
        </div>

        <div class="info-box">
            <div class="info-label">Γήπεδο</div>
            <div class="info-value" id="sidebarStadium">Στάδιο</div>
        </div>
        <div class="info-box">
            <div class="info-label">Πόλη</div>
            <div class="info-value" id="sidebarCity">Πόλη</div>
        </div>
    </div>

    <script>
        let allTeams = [];
        let world;
        let currentCountryTeams = []; // Κρατάει τις ομάδες της τρέχουσας χώρας

        Promise.all([
            fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson').then(res => res.json()),
            fetch('teams.json').then(res => res.json())
        ]).then(([countriesData, teamsData]) => {
            
            document.getElementById('loading').style.display = 'none';
            allTeams = teamsData;

            world = Globe()
                (document.getElementById('globeViz'))
                // Ρεαλιστικά textures ημέρας
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg') 
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .showAtmosphere(true)
                .atmosphereColor('#42b6f5') // Πιο ανοιχτό/φωτεινό μπλε για ουρανό
                .atmosphereAltitude(0.15)
                .pointOfView({ lat: 38.0361, lng: 23.7431, altitude: 2 }) // Αρχικό focus κοντά στην OPAP Arena
                
                .polygonsData(countriesData.features)
                .polygonAltitude(0.005)
                .polygonCapColor(() => 'rgba(255, 255, 255, 0)')
                .polygonSideColor(() => 'rgba(255, 255, 255, 0)')
                .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.15)')
                .onPolygonHover(hoverD => {
                    // Ελαφρύ "χλοοτάπητα" χρώμα στο hover αντί για άσπρο
                    world.polygonCapColor(d => d === hoverD ? 'rgba(76, 175, 80, 0.15)' : 'rgba(255, 255, 255, 0)');
                })
                .onPolygonClick(polygon => {
                    const countryName = polygon.properties.ADMIN;
                    const teamsInCountry = allTeams.filter(team => team.country === countryName);
                    
                    if(teamsInCountry.length > 0) {
                        currentCountryTeams = teamsInCountry;
                        renderMarkers(groupTeamsByCity(teamsInCountry));
                        
                        // Υπολογισμός κέντρου
                        const centerLat = teamsInCountry.reduce((sum, t) => sum + t.lat, 0) / teamsInCountry.length;
                        const centerLng = teamsInCountry.reduce((sum, t) => sum + t.lng, 0) / teamsInCountry.length;
                        world.pointOfView({ lat: centerLat, lng: centerLng, altitude: 0.6 }, 1500);
                    }
                });

            world.controls().autoRotate = false;

            // ΛΕΙΤΟΥΡΓΙΑ CLUSTERING (Ομαδοποίηση ανά Πόλη)
            function groupTeamsByCity(teams) {
                const groups = {};
                teams.forEach(t => {
                    if (!groups[t.city]) groups[t.city] = { lat: t.lat, lng: t.lng, city: t.city, teams: [] };
                    groups[t.city].teams.push(t);
                });
                
                const elementsData = [];
                Object.values(groups).forEach(group => {
                    if (group.teams.length === 1) {
                        // Αν η πόλη έχει μόνο 1 ομάδα, φτιάχνουμε κατευθείαν το marker της ομάδας
                        elementsData.push({ type: 'team', ...group.teams[0], displayLat: group.lat, displayLng: group.lng });
                    } else {
                        // Αν η πόλη έχει πολλές ομάδες, φτιάχνουμε ένα cluster marker
                        elementsData.push({ type: 'cluster', lat: group.lat, lng: group.lng, city: group.city, teams: group.teams });
                    }
                });
                return elementsData;
            }

            // Spiderify: Ανοίγει τις ομάδες γύρω από την πόλη
            function expandCluster(clusterData) {
                const radius = 0.12; // Απόσταση ανοίγματος σε μοίρες
                const expandedTeams = clusterData.teams.map((t, index) => {
                    const angle = (Math.PI * 2 / clusterData.teams.length) * index;
                    return {
                        type: 'team',
                        ...t,
                        displayLat: clusterData.lat + radius * Math.cos(angle),
                        displayLng: clusterData.lng + radius * Math.sin(angle)
                    };
                });

                // Παίρνουμε τα τρέχοντα markers, αφαιρούμε το cluster που πατήθηκε και προσθέτουμε τις ξεχωριστές ομάδες
                const currentData = world.htmlElementsData().filter(d => d.city !== clusterData.city);
                world.htmlElementsData([...currentData, ...expandedTeams]);
                
                // Ζουμ στην πόλη
                world.pointOfView({ lat: clusterData.lat, lng: clusterData.lng, altitude: 0.2 }, 1200);
            }

            // Δημιουργία HTML στοιχείων (Markers)
            function renderMarkers(data) {
                world.htmlElementsData(data)
                    .htmlElement(d => {
                        const el = document.createElement('div');
                        
                        if (d.type === 'cluster') {
                            el.className = 'marker-cluster';
                            el.innerText = d.teams.length;
                            
                            // Tooltip πόλης
                            const tooltip = document.createElement('div');
                            tooltip.className = 'marker-tooltip';
                            tooltip.innerHTML = `<b>${d.city}</b><br>${d.teams.length} Ομάδες`;
                            el.appendChild(tooltip);

                            el.onclick = () => expandCluster(d);
                        } 
                        else if (d.type === 'team') {
                            el.className = 'marker-team';
                            if (d.id === 'aek_athens') el.classList.add('aek'); // Ειδικό styling
                            
                            // Tooltip ομάδας
                            const tooltip = document.createElement('div');
                            tooltip.className = 'marker-tooltip';
                            tooltip.innerHTML = `<b style="color:${d.id==='aek_athens'?'#F3D11A':'#fff'};">${d.team_name}</b><br><span style="color:#aaa;">${d.stadium}</span>`;
                            el.appendChild(tooltip);

                            el.onclick = () => {
                                world.pointOfView({ lat: d.displayLat, lng: d.displayLng, altitude: 0.15 }, 1000);
                                showSidebar(d);
                            };
                        }
                        return el;
                    })
                    .htmlLat(d => d.type === 'cluster' ? d.lat : d.displayLat)
                    .htmlLng(d => d.type === 'cluster' ? d.lng : d.displayLng);
            }

            // Sidebar Λογική
            const sidebar = document.getElementById('teamSidebar');
            
            function showSidebar(team) {
                document.getElementById('sidebarTeamName').innerText = team.team_name;
                document.getElementById('sidebarLeague').innerText = team.league || "Unknown League";
                document.getElementById('sidebarCountry').innerText = team.country;
                document.getElementById('sidebarStadium').innerText = team.stadium;
                document.getElementById('sidebarCity').innerText = team.city;
                
                const trophiesDiv = document.getElementById('sidebarTrophies');
                if (team.trophies && team.trophies !== "") {
                    trophiesDiv.innerText = team.trophies;
                    trophiesDiv.style.display = "inline-block";
                } else {
                    trophiesDiv.style.display = "none";
                }

                const jerseyImg = document.getElementById('jerseyImage');
                if (team.jersey_url && team.jersey_url !== "") {
                    jerseyImg.src = team.jersey_url;
                    jerseyImg.style.display = "block";
                } else {
                    jerseyImg.style.display = "none";
                }

                // Χρωματισμός
                if (team.id === 'aek_athens') {
                   document.getElementById('sidebarTeamName').style.color = '#F3D11A';
                   document.getElementById('sidebarLeague').style.color = '#F3D11A';
                   sidebar.style.borderLeftColor = '#F3D11A';
                } else {
                   document.getElementById('sidebarTeamName').style.color = '#fff';
                   document.getElementById('sidebarLeague').style.color = '#00e676';
                   sidebar.style.borderLeftColor = 'rgba(255, 255, 255, 0.15)';
                }

                sidebar.classList.add('active');
            }

            document.getElementById('closeSidebar').addEventListener('click', () => {
                sidebar.classList.remove('active');
            });
        }).catch(err => {
            console.error("Σφάλμα:", err);
            document.getElementById('loading').innerText = "Σφάλμα φόρτωσης. Έλεγξε το teams.json";
        });
    </script>
</body>
</html>
